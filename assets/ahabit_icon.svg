<svg width="1024" height="1024"
  viewBox="0 0 1024 1024"
  xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg"
      x1="0" y1="0" x2="1024" y2="1024"
      gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6B8A"/>
      <stop offset="100%" stop-color="#FF4757"/>
    </linearGradient>
    <linearGradient id="shine"
      x1="0" y1="0" x2="0" y2="512"
      gradientUnits="userSpaceOnUse">
      <stop offset="0%"
        stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%"
        stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="1024" height="1024"
    fill="url(#bg)"/>

  <!-- Top shine overlay -->
  <rect width="1024" height="512"
    fill="url(#shine)"/>

  <!-- Decorative circles -->
  <circle cx="200" cy="200" r="280"
    fill="white" opacity="0.05"/>
  <circle cx="900" cy="900" r="360"
    fill="white" opacity="0.04"/>

  <!-- White card glow -->
  <rect x="172" y="172" width="680" height="680"
    rx="150" fill="white" opacity="0.15"/>

  <!-- White card -->
  <rect x="192" y="192" width="640" height="640"
    rx="140" fill="white" opacity="0.95"/>

  <!-- A left leg -->
  <line x1="512" y1="280"
    x2="320" y2="760"
    stroke="#FF6B8A" stroke-width="72"
    stroke-linecap="round"/>

  <!-- A right leg -->
  <line x1="512" y1="280"
    x2="704" y2="760"
    stroke="#FF6B8A" stroke-width="72"
    stroke-linecap="round"/>

  <!-- Checkmark crossbar -->
  <polyline
    points="370,540 468,638 680,426"
    stroke="#FF4757"
    stroke-width="68"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"/>
</svg>
