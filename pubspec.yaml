name: habit_punch
description: Ahabit - Build better habits, one day at a time
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^6.1.0
  intl: ^0.19.0
  fl_chart: ^0.66.0
  provider: ^6.1.1
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  flutter_slidable: ^3.0.1
  table_calendar: ^3.0.9
  uuid: ^4.3.3
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.1
  home_widget: ^0.6.0
  share_plus: ^7.2.1
  gal: ^2.3.0
  path_provider: ^2.1.1
  flutter_timezone: 3.0.1
  audioplayers: ^6.5.1
  workmanager: ^0.6.0
  webview_flutter: ^4.8.0
  url_launcher: ^6.3.0
  firebase_core: ^3.0.0
  firebase_remote_config: ^5.0.0
  package_info_plus: ^8.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.13
  image: ^4.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/sounds/
    - assets/ahabit_icon.svg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FF6B8A"
  adaptive_icon_foreground: "assets/icon.png"
  web:
    generate: false

flutter_native_splash:
  color: "#FF6B8A"
  image: assets/icon.png
  color_dark: "#FF4757"
  image_dark: assets/icon.png
  android_12:
    image: assets/icon.png
    icon_background_color: "#FF6B8A"
    image_dark: assets/icon.png
    icon_background_color_dark: "#FF4757"
  fullscreen: true
  android: true
  ios: true
