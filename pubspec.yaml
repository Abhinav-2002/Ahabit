name: habit_punch
description: A lightweight, minimalist punch card habit tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^6.1.0
  intl: ^0.19.0
  fl_chart: ^0.66.0
  provider: ^6.1.1
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  flutter_slidable: ^3.0.1
  table_calendar: ^3.0.9
  uuid: ^4.3.3
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.1
  home_widget: ^0.6.0
  share_plus: ^7.2.1
  gal: ^2.3.0
  path_provider: ^2.1.1
  flutter_timezone: 3.0.1
  audioplayers: ^6.5.1
  workmanager: ^0.6.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/sounds/
